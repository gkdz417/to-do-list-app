<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List | Görev Yöneticisi</title>
  <meta name="description" content="Modern ve şık bir görev yöneticisi uygulaması. Görevlerinizi kolayca ekleyin, düzenleyin ve tamamlayın." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <h1>Görev Yöneticisi</h1>
        </div>
        <div class="date-badge" id="dateBadge"></div>
      </div>
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-num" id="totalCount">0</span>
          <span class="stat-label">Toplam</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="activeCount">0</span>
          <span class="stat-label">Aktif</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="doneCount">0</span>
          <span class="stat-label">Tamamlanan</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-label" id="progressLabel">0%</span>
        </div>
      </div>
    </header>

    <div class="input-section">
      <div class="input-wrapper">
        <input
          type="text"
          id="taskInput"
          placeholder="Yeni görev ekle..."
          maxlength="120"
          autocomplete="off"
        />
        <select id="prioritySelect">
          <option value="normal">🔵 Normal</option>
          <option value="high">🔴 Yüksek</option>
          <option value="low">🟢 Düşük</option>
        </select>
        <button id="addBtn" onclick="addTask()">
          <span>+</span>
        </button>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Tümü</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Aktif</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done')">Tamamlanan</button>
      <button class="filter-btn danger" onclick="clearCompleted()">Tamamlananları Sil</button>
    </div>

    <ul class="task-list" id="taskList">
      <li class="empty-state" id="emptyState">
        <span class="empty-icon">📋</span>
        <p>Henüz görev yok.<br/>Yukarıdan yeni bir görev ekleyin!</p>
      </li>
    </ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
